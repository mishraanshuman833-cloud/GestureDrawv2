<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AirDraw AI Infinity Pro</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
</head>

<body>

<div id="loading">
    <div class="loader"></div>
    <h2>Loading AirDraw AI...</h2>
</div>

<div id="app" class="hidden">

    <!-- Camera -->
    <video id="video" autoplay playsinline></video>

    <!-- Canvas -->
    <canvas id="drawCanvas"></canvas>
    <canvas id="effectCanvas"></canvas>

    <!-- Top Bar -->
    <header>

        <div class="logo">
            ✨ AirDraw AI Infinity
        </div>

        <div class="status">

            <span id="cameraStatus">
                📷 Camera
            </span>

            <span id="gestureStatus">
                ✋ Waiting...
            </span>

            <span id="fps">
                0 FPS
            </span>

        </div>

    </header>

    <!-- Left Toolbar -->
    <aside class="toolbar">

        <button id="penTool" class="active">✏ Pen</button>

        <button id="neonTool">💎 Neon</button>

        <button id="markerTool">🖍 Marker</button>

        <button id="eraserTool">🩹 Eraser</button>

        <button id="undoBtn">↩ Undo</button>

        <button id="redoBtn">↪ Redo</button>

        <button id="clearBtn">🗑 Clear</button>

        <button id="saveBtn">💾 Save</button>

    </aside>

    <!-- Bottom Controls -->
    <div class="bottomPanel">

        <label>Brush</label>

        <input
            id="brushSize"
            type="range"
            min="2"
            max="40"
            value="6">

        <label>Opacity</label>

        <input
            id="opacity"
            type="range"
            min="0.1"
            max="1"
            step="0.1"
            value="1">

        <input
            id="colorPicker"
            type="color"
            value="#00ffff">

    </div>

</div>

<!-- JS Files -->
<script src="js/utils.js"></script>

<script src="js/camera.js"></script>

<script src="js/gesture.js"></script>

<script src="js/drawEngine.js"></script>

<script src="js/shapeRecognizer.js"></script>

<script src="js/ui.js"></script>

<script src="js/app.js"></script>

</body>
</html>
